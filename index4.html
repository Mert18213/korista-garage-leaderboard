<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kriptoloji Quiz - Sayfa 4</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

.menu{
    text-align:center;
    margin-bottom:25px;
}

.page-btn{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.page-btn:hover{
    background:#34495e;
}

.active{
    background:#e74c3c !important;
}

.question{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.control-btn{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.control-btn:hover{
    background:#2980b9;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>🛡️ Kriptoloji Quiz - Sayfa 4</h1>

<div class="menu">

<button class="page-btn" onclick="goPage(1)">1</button>
<button class="page-btn" onclick="goPage(2)">2</button>
<button class="page-btn" onclick="goPage(3)">3</button>
<button class="page-btn active" onclick="goPage(4)">4</button>

</div>

<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }

    if(page === 4){

        window.location.href = "index4.html";

    }

}

const questions = [

{
q:"Bir saldırgan, daha önce veri ihlallerinden elde ettiği yaygın parolaları (“123456”, “password”, “qwerty” vb.) kullanarak sistematik şekilde giriş denemeleri yapmaktadır. Bu saldırganın kullandığı yöntem aşağıdakilerden hangisidir?",
options:[
"A) Brute-Force Saldırısı",
"B) Sözlük Saldırısı",
"C) Replay Saldırısı",
"D) Side-Channel Saldırısı"
],
a:1
},

{
q:"Bir yazılım şirketi, geliştirdiği sistemin uzun vadeli güvenliğini değerlendirmektedir. NIST standartlarına göre minimum güvenlik seviyesi dikkate alınmaktadır. Aşağıdakilerden hangisi minimum güvenlik seviyesi olarak kabul edilir?",
options:[
"A) 64 Bit",
"B) 80 Bit",
"C) 112 Bit",
"D) 256 Bit"
],
a:2
},

{
q:"Bir güvenlik mühendisi, sistemin kuantum bilgisayarlara karşı da güvenli olmasını istemektedir. Grover algoritması göz önüne alındığında hangi anahtar uzunluğu daha güvenli kabul edilir?",
options:[
"A) 64 bit",
"B) 112 bit",
"C) 128 bit",
"D) 256 bit"
],
a:3
},

{
q:"Aynı karakter seti kullanılarak parola uzunluğu 8 karakterden 12 karaktere çıkarılmıştır. Bu değişikliğin brute-force saldırısına etkisi nedir?",
options:[
"A) Kırılma süresi doğrusal olarak artar",
"B) Kırılma süresi üstel olarak artar",
"C) Kırılma süresi değişmez",
"D) Sadece donanım hızına bağlıdır"
],
a:1
},

{
q:"Bir saldırganın deneme hızı 1 milyon deneme/sn’den 2 milyon deneme/sn’ye çıkarılmıştır. Bu durumda kırılma süresi nasıl değişir?",
options:[
"A) Süre yarıya düşer",
"B) Süre iki katına çıkar",
"C) Süre üstel olarak azalır",
"D) Süre değişmez"
],
a:0
},

{
q:"12 karakter uzunluğunda sadece rakamlardan oluşan bir parola ile aynı uzunlukta karmaşık bir parola karşılaştırılmaktadır. Güvenlik farkının temel nedeni nedir?",
options:[
"A) Parola uzunluğu farklıdır",
"B) Kullanılan algoritma değişmiştir",
"C) Karakter seti büyüklüğü (entropi) artmıştır",
"D) Donanım hızı etkilenmiştir"
],
a:2
},

{
q:"Aşağıdakilerden hangisi bir “Sıfır Bilgi İspatı (ZKP)” protokolünün sağlaması gereken 3 temel özellikten biri değildir?",
options:[
"A) Doğruluk (Completeness)",
"B) Sağlamlık (Soundness)",
"C) Şeffaflık (Transparency)",
"D) Sıfır Bilgi (Zero-Knowledge)"
],
a:2
},

{
q:"ZKP protokollerinde, sırrı bilmeyen bir saldırganın şans eseri sistemi kandırma ihtimalini (Soundness açığını) milyonda birlere düşürmek için hangi yöntem kullanılır?",
options:[
"A) Şifreleme anahtarının boyutunu 256 bit’e çıkarmak.",
"B) Meydan okuma - Cevap (Challenge-Response) işlemini defalarca tekrarlamak.",
"C) İşlemleri sadece kapalı ağlarda (Intranet) gerçekleştirmek.",
"D) Graf düğümlerinin sayısını azaltmak."
],
a:1
},

{
q:"Graf izomorfizmi tabanlı bir ZKP sisteminde, Kanıtlayıcının (Prover) tüm dünya ile paylaştığı “Açık (Public)” graflar A ve B iken; dış dünyadan kesinlikle sakladığı “Asıl Sır (Private)” aşağıdakilerden hangisidir?",
options:[
"A) Graf C’nin sahip olduğu düğüm sayısı.",
"B) Graf A’dan Graf C’ye nasıl gidildiğini gösteren harita.",
"C) Graf A ile Graf B’nin birbirine dönüşümünü sağlayan harita.",
"D) Meydan okuma aşamasında üretilen rastgele sayılar."
],
a:2
},

{
q:"Graf İzomorfizmi protokolünün 2. adımında, Doğrulayıcı meydan okuma olarak “Bana Graf C’nin, Graf B’ye eşit olduğunu kanıtla” derse, Kanıtlayıcının göndermesi gereken bilgi nedir?",
options:[
"A) Graf C’den Graf B’ye dönüşüm sağlayan harita.",
"B) Graf A’dan Graf B’ye dönüşüm sağlayan harita (Asıl sır).",
"C) Graf C’yi baştan oluşturan algoritmanın kendisi.",
"D) Graf B’nin hash edilmiş özeti."
],
a:0
},

{
q:"ZKP sistemleri mükemmel bir güvenlik sağlamasına rağmen günümüzde her sistemde standart şifrelerin yerini alamamasının en temel teknik nedeni nedir?",
options:[
"A) Yalnızca blokzincir üzerinde çalışabiliyor olması.",
"B) Kuantum bilgisayarlara karşı çok zayıf olması.",
"C) Çok yüksek işlemci (CPU) gücü ve iletişim maliyeti gerektirmesi.",
"D) Üretilen kanıtların çok çabuk süresinin dolması."
],
a:2
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">

<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
