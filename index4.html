<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖼️ Görüntü İşleme - Sayfa 4</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

.menu{
    text-align:center;
    margin-bottom:25px;
}

.page-btn{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.page-btn:hover{
    background:#34495e;
}

.active{
    background:#e74c3c !important;
}

.question{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.control-btn{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.control-btn:hover{
    background:#2980b9;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>🖼️ Görüntü İşleme - Sayfa 4</h1>

<div class="menu">

<button class="page-btn" onclick="goPage(1)">1</button>
<button class="page-btn" onclick="goPage(2)">2</button>
<button class="page-btn" onclick="goPage(3)">3</button>
<button class="page-btn active" onclick="goPage(4)">4</button>

</div>

<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }

    if(page === 4){

        window.location.href = "index4.html";

    }

}

const questions = [

{
q:`Aşağıdaki MATLAB kodu ne yapar?

I=imread('coins.png');
J=histeq(I);
imshow(J);`,
options:[
"A) Görüntüyü döndürür",
"B) Histogram eşitleme uygular",
"C) Gürültü ekler",
"D) Kenar çıkarır",
"E) Resmi büyütür"
],
a:1
},

{
q:`Aşağıdaki kodun amacı nedir?

I=imread('coins.png');
I2=im2double(I);
J=1.75*log(1+I2);
imshow(J);`,
options:[
"A) Görüntüyü negatif yapar",
"B) Kenar belirler",
"C) Logaritmik dönüşüm uygular",
"D) Histogram oluşturur",
"E) Segmentasyon yapar"
],
a:2
},

{
q:`Bu MATLAB kodu ne yapmaktadır?

A=imread('Lena.tiff');
B=rgb2gray(A);
imshow(B);`,
options:[
"A) RGB görüntüyü negatif yapar",
"B) Görüntüyü ikili yapar",
"C) Renkli görüntüyü gri seviyeye dönüştürür",
"D) Histogram eşitler",
"E) Gürültü ekler"
],
a:2
},

{
q:`Bu kodun çıktısı nedir?

A=rgb2gray(imread('Lena.tiff'));
B=im2bw(A);
imshow(B);`,
options:[
"A) Negatif görüntü",
"B) Kenar görüntüsü",
"C) Siyah-beyaz görüntü",
"D) Renkli görüntü",
"E) Gürültülü görüntü"
],
a:2
},

{
q:`Bu kod ne yapar?

I=imread('cameraman.tif');
I2=imrotate(I,30,'nearest');
imshow(I2);`,
options:[
"A) Histogram eşitler",
"B) 30 derece döndürür",
"C) Gürültü ekler",
"D) Kenar çıkarır",
"E) Keskinleştirir"
],
a:1
},

{
q:`Bu kodun amacı nedir?

I=imread('cameraman.tif');
J=edge(I,'sobel');
imshow(J);`,
options:[
"A) Segmentasyon",
"B) Gürültü giderme",
"C) Sobel ile kenar belirleme",
"D) Histogram eşitleme",
"E) Renk dönüşümü"
],
a:2
},

{
q:`Aşağıdaki kod ne yapar?

I=edge(g,'prewitt');
imshow(I);`,
options:[
"A) Prewitt operatörü ile kenar belirler",
"B) Histogram oluşturur",
"C) Tuz-biber gürültüsü ekler",
"D) Resmi küçültür",
"E) Segmentasyon yapar"
],
a:0
},

{
q:`Bu kodun amacı nedir?

l=fspecial('laplacian',1);
icz=edge(a,'zerocross',l);`,
options:[
"A) Histogram eşitleme",
"B) Laplace tabanlı kenar belirleme",
"C) Segmentasyon",
"D) Renk dönüşümü",
"E) Median filtreleme"
],
a:1
},

{
q:`Bu kod ne işe yarar?

log=fspecial('log',13,2);
icz1=edge(a,'zerocross',log);`,
options:[
"A) Sobel uygular",
"B) Median filtre uygular",
"C) LoG ile kenar belirler",
"D) Histogram oluşturur",
"E) Görüntüyü keskinleştirir"
],
a:2
},

{
q:`Bu kodun amacı nedir?

d=imnoise(I,'salt & pepper');
imshow(d);`,
options:[
"A) Gaussian gürültü eklemek",
"B) Tuz-biber gürültüsü eklemek",
"C) Histogram oluşturmak",
"D) Görüntüyü büyütmek",
"E) Segmentasyon yapmak"
],
a:1
},

{
q:`Aşağıdaki kod ne yapar?

K=medfilt2(JJ);
imshow(K);`,
options:[
"A) Median filtre uygular",
"B) Sobel uygular",
"C) Histogram eşitler",
"D) Renk değiştirir",
"E) Segmentasyon yapar"
],
a:0
},

{
q:`Bu kodun amacı nedir?

filt2=wiener2(no);
imshow(filt2);`,
options:[
"A) Wiener filtresi uygular",
"B) Sobel uygular",
"C) Renk dönüşümü yapar",
"D) Histogram eşitler",
"E) Motion filtresi uygular"
],
a:0
},

{
q:`Bu kod ne yapmaktadır?

h=fspecial('motion',50,45);
J=imfilter(I,h);`,
options:[
"A) Keskinleştirme",
"B) Motion blur oluşturma",
"C) Histogram eşitleme",
"D) Kenar bulma",
"E) Segmentasyon"
],
a:1
},

{
q:`Aşağıdaki kodun amacı nedir?

h=fspecial('unsharp');
J=imfilter(I,h);`,
options:[
"A) Bulanıklaştırma",
"B) Keskinleştirme",
"C) Segmentasyon",
"D) Histogram oluşturma",
"E) Gürültü ekleme"
],
a:1
},

{
q:`Bu kod ne yapar?

SE=strel('disk',5);`,
options:[
"A) Histogram oluşturur",
"B) Yapı elemanı oluşturur",
"C) Sobel filtresi uygular",
"D) Median filtre uygular",
"E) Segmentasyon yapar"
],
a:1
},

{
q:`Bu kodun amacı nedir?

J=imdilate(I,SE);`,
options:[
"A) Aşınma uygular",
"B) Genişleme uygular",
"C) Histogram eşitler",
"D) Gürültü ekler",
"E) Kenar belirler"
],
a:1
},

{
q:`Bu MATLAB kodu ne yapar?

J=imerode(I,SE);`,
options:[
"A) Genişleme",
"B) Aşınma",
"C) Segmentasyon",
"D) Döndürme",
"E) Histogram eşitleme"
],
a:1
},

{
q:`Bu kodun amacı nedir?

background=imopen(I,strel('disk',15));
C=imsubtract(I,background);`,
options:[
"A) Arka plan çıkarma",
"B) Sobel uygulama",
"C) Histogram eşitleme",
"D) Renk dönüşümü",
"E) Motion filtreleme"
],
a:0
},

{
q:`Bu MATLAB kodu ne yapar?

I=imread('cameraman.tif');
imhist(I);`,
options:[
"A) Kenar belirler",
"B) Histogram oluşturur",
"C) Segmentasyon yapar",
"D) Gürültü ekler",
"E) Döndürme yapar"
],
a:1
},

{
q:`Aşağıdaki kodun amacı nedir?

tt=filter2(a,t);
imshow(tt);`,
options:[
"A) Ortalama filtre uygulamak",
"B) Kenar belirlemek",
"C) Histogram eşitlemek",
"D) Segmentasyon yapmak",
"E) Renk dönüşümü yapmak"
],
a:0
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">

<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
