<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Otomata Quiz Pro - 11. Hafta</title>
<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.question { margin-bottom: 20px; padding:15px; background:white; border-radius:10px; }
button { margin-top:10px; padding:8px 12px; cursor:pointer; }
.correct { color: green; font-weight:bold; }
.wrong { color: red; font-weight:bold; }
h3 { background:#ddd; padding:10px; border-radius:8px; }

.week-btn{
    padding:8px 12px;
    margin:3px;
    background:#333;
    color:white;
    border:none;
    border-radius:5px;
}
.week-btn:hover{ background:#555; }
.active{ background:#e74c3c !important; }
</style>
</head>

<body>

<h2>🧠 Otomata Quiz - 11. Hafta (FINAL)</h2>

<div>
<button class="week-btn" onclick="goWeek(1)">1</button>
<button class="week-btn" onclick="goWeek(2)">2</button>
<button class="week-btn" onclick="goWeek(3)">3</button>
<button class="week-btn" onclick="goWeek(4)">4</button>
<button class="week-btn" onclick="goWeek(5)">5</button>
<button class="week-btn" onclick="goWeek(6)">6</button>
<button class="week-btn" onclick="goWeek(7)">7</button>
<button class="week-btn" onclick="goWeek(8)">8</button>
<button class="week-btn" onclick="goWeek(9)">9</button></button>
<button class="week-btn active" onclick="goWeek(10)">10</button>
</div>

<div id="quiz"></div>

<button onclick="showScore()">📊 Skoru Göster</button>
<p id="score"></p>

<script>

function goWeek(w){
    if(w === 1){
        window.location.href = "index.html";
    } else {
        window.location.href = "index" + w + ".html";
    }
}

const questions = [

{q:"Bir düzenli dil için hangisi doğrudur?",
options:[
"Sadece DFA ile tanımlanır",
"Sadece NFA ile tanımlanır",
"NFA ve DFA eşdeğerdir",
"Hiçbiri"
], a:2},

{q:"NFA’dan DFA’ya dönüşüm neden yapılır?",
options:[
"Hızlandırmak için",
"Belirsizliği kaldırmak için",
"Sadeleştirmek için",
"Hepsi"
], a:3},

{q:"NFA’da aynı giriş için ne olabilir?",
options:[
"Tek geçiş",
"Birden fazla geçiş",
"Hiç geçiş yok",
"Sabit geçiş"
], a:1},

{q:"DFA’da her durum için ne zorunludur?",
options:[
"Sadece 1 geçiş",
"Her sembol için geçiş tanımlı olmalı",
"Final olması",
"Başlangıç olmaması"
], a:1},

{q:"λ geçişleri hangi modele aittir?",
options:[
"DFA",
"NFA",
"NFA-λ",
"Hepsi"
], a:2},

{q:"Bir NFA her zaman DFA’ya çevrilebilir mi?",
options:[
"Hayır",
"Evet",
"Bazen",
"Tanımsız"
], a:1},

{q:"DFA neden daha karmaşık olabilir?",
options:[
"Daha az durum içerir",
"Daha fazla durum içerebilir",
"Çalışmaz",
"Fonksiyon yok"
], a:1},

{q:"Ölü durum (dead state) nedir?",
options:[
"Hiç geçiş olmayan durum",
"Her girişte kendine dönen durum",
"Final durum",
"Başlangıç durumu"
], a:1},

{q:"Alt küme yöntemi (subset construction) ne için kullanılır?",
options:[
"NFA → DFA dönüşümü",
"DFA → NFA",
"Regex → DFA direkt",
"Hiçbiri"
], a:0},

{q:"NFA’da kabul durumu nedir?",
options:[
"Başlangıç",
"Her durum",
"Final durum",
"Fonksiyon"
], a:2},

{q:"Bir DFA’da boş geçiş olabilir mi?",
options:[
"Evet",
"Hayır",
"Bazen",
"Tanımsız"
], a:1},

{q:"NFA’da boş geçiş neden kullanılır?",
options:[
"Hız için",
"Esneklik için",
"Gereksiz",
"Sadece DFA için"
], a:1},

{q:"DFA’da belirsizlik var mı?",
options:[
"Evet",
"Hayır",
"Bazen",
"Tanımsız"
], a:1},

{q:"NFA’nın avantajı nedir?",
options:[
"Daha zor olması",
"Daha kolay tasarım",
"Daha yavaş olması",
"Gereksiz olması"
], a:1},

{q:"Bir kelime kabul edilmesi için ne gerekir?",
options:[
"Başlangıçta kalmalı",
"Final duruma ulaşmalı",
"Ortada kalmalı",
"Hiçbiri"
], a:1}

];

let score = 0;
const quizDiv = document.getElementById("quiz");

quizDiv.innerHTML += "<h3>🏁 FINAL TEST</h3>";

questions.forEach((item, index) => {
    let html = `<div class="question">
    <p>${index+1}) ${item.q}</p>`;
    
    item.options.forEach((opt, i) => {
        html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
    });

    html += `<button onclick="check(${index})">Kontrol Et</button>
    <p id="r${index}"></p>
    </div>`;

    quizDiv.innerHTML += html;
});

function check(i){
    let opts = document.getElementsByName("q"+i);
    let selected = -1;

    for(let j=0;j<opts.length;j++){
        if(opts[j].checked) selected = j;
    }

    let res = document.getElementById("r"+i);

    if(selected === -1){
        res.innerHTML="⚠️ Seçim yap!";
        return;
    }

    if(selected === questions[i].a){
        res.innerHTML="✅ Doğru!";
        res.className="correct";
    } else {
        res.innerHTML="❌ Yanlış!";
        res.className="wrong";
    }
}

function showScore(){
    score = 0;
    questions.forEach((q,i)=>{
        let opts = document.getElementsByName("q"+i);
        for(let j=0;j<opts.length;j++){
            if(opts[j].checked && j===q.a){
                score++;
            }
        }
    });

    document.getElementById("score").innerHTML = "Skor: " + score + " / 15";
}

</script>

</body>
</html>
