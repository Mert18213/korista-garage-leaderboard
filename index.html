<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hash Collision Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
input, select, button {
    padding: 10px;
    margin: 10px;
}
.box {
    border: 1px solid #444;
    padding: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔐 Hash Collision Lab</h1>

<div class="box">
<h2>Hash Hesapla</h2>
<input id="text" placeholder="Metin gir">
<select id="algo">
    <option value="MD5">MD5</option>
    <option value="SHA1">SHA1</option>
    <option value="SHA256">SHA256</option>
</select>
<button onclick="calculateHash()">Hesapla</button>

<p id="result"></p>
</div>

<div class="box">
<h2>Avalanche Effect</h2>
<button onclick="avalanche()">1 Harf Değiştir</button>
<p id="avalancheResult"></p>
</div>

<div class="box">
<h2>Collision Deneyi (Kısaltılmış Hash)</h2>
<select id="length">
    <option value="4">4 karakter</option>
    <option value="6">6 karakter</option>
    <option value="8">8 karakter</option>
</select>
<button onclick="collision()">Başlat</button>

<p id="collisionResult"></p>
</div>

<script>

function getHash(text, algo){
    if(algo === "MD5") return CryptoJS.MD5(text).toString();
    if(algo === "SHA1") return CryptoJS.SHA1(text).toString();
    if(algo === "SHA256") return CryptoJS.SHA256(text).toString();
}

function calculateHash(){
    let text = document.getElementById("text").value;
    let algo = document.getElementById("algo").value;

    let hash = getHash(text, algo);

    document.getElementById("result").innerText =
        "Hash: " + hash;
}

function avalanche(){
    let text = document.getElementById("text").value;
    if(text.length < 2) return alert("En az 2 karakter gir");

    let changed = text.slice(0, -1) + "X";

    let h1 = getHash(text, "SHA256");
    let h2 = getHash(changed, "SHA256");

    document.getElementById("avalancheResult").innerText =
        "Orijinal: " + h1 + "\nDeğişmiş: " + h2;
}

function randomString(){
    return Math.random().toString(36).substring(2, 10);
}

function collision(){
    let len = document.getElementById("length").value;
    let seen = {};
    let count = 0;

    while(true){
        let str = randomString();
        let hash = CryptoJS.SHA256(str).toString().substring(0, len);

        if(seen[hash]){
            document.getElementById("collisionResult").innerText =
                "Collision bulundu!\n" +
                seen[hash] + " == " + str +
                "\nHash: " + hash +
                "\nDeneme: " + count;
            break;
        } else {
            seen[hash] = str;
        }

        count++;

        if(count > 1000000){
            document.getElementById("collisionResult").innerText =
                "Bulunamadı (limit aşıldı)";
            break;
        }
    }
}

</script>

</body>
</html>
