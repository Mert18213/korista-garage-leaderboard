<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Otomata Quiz</title>
<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.question { margin-bottom: 20px; padding:15px; background:white; border-radius:10px; }
button { margin-top:10px; padding:8px 12px; cursor:pointer; }
.correct { color: green; font-weight:bold; }
.wrong { color: red; font-weight:bold; }
#score { font-size:20px; font-weight:bold; margin-top:20px; }
</style>
</head>

<body>

<h2>🧠 Otomata Quiz (30 Soru)</h2>

<div id="quiz"></div>

<button onclick="showScore()">📊 Skoru Göster</button>
<p id="score"></p>

<script>

const questions = [
{q:"Alfabe nedir?", options:["Sonsuz küme","Sonlu semboller kümesi","Sayılar kümesi","Kelimeler kümesi"], a:1},
{q:"Boş kelimenin uzunluğu?", options:["1","0","Sonsuz","Tanımsız"], a:1},
{q:"|w| neyi ifade eder?", options:["Değer","Uzunluk","Tür","Dil"], a:1},
{q:"Dil tanımı için gerekli?", options:["Kelimeler","Alfabe","Alfabe+kurallar","Semboller"], a:2},
{q:"Concatenation nedir?", options:["Ters çevirme","Birleştirme","Silme","Bölme"], a:1},
{q:"Palindrome nedir?", options:["Farklı okunan","Aynı okunan","Sayı","Çift uzunluk"], a:1},
{q:"Σ* nedir?", options:["Tek kelime","Tüm kelimeler","Boş küme","Sayı"], a:1},
{q:"Prefix nedir?", options:["Orta","Son","Baş","Tüm"], a:2},
{q:"Suffix nedir?", options:["Baş","Son","Orta","Uzunluk"], a:1},
{q:"Subword nedir?", options:["Baş","Son","Alt dizi","Tüm"], a:2},

{q:"DFA’da geçiş sayısı?", options:["0","1","2","Sonsuz"], a:1},
{q:"NFA özelliği?", options:["Tek yol","Çok yol","Geçiş yok","Deterministik"], a:1},
{q:"DFA’da olmayan?", options:["Q","Σ","Γ","f"], a:2},
{q:"Başlangıç durumu?", options:["F","Q","s","Σ"], a:2},
{q:"Kabul durumları?", options:["Σ","Q","F","f"], a:2},
{q:"Kabul şartı?", options:["Döngü","Başlangıç","Final state","Kısa yol"], a:2},
{q:"ε geçişi?", options:["DFA","NFA","ε-NFA","TG"], a:2},
{q:"Her NFA için?", options:["DFA yok","DFA vardır","Daha güçlü","Çalışmaz"], a:1},
{q:"TG özelliği?", options:["Tek sembol","Çok sembol","Sayı","Deterministik"], a:1},
{q:"Geçersiz FA?", options:["Çok state","Final yok","Alfabe var","Döngü"], a:1},

{q:"RE neyi tanımlar?", options:["Sayı","Dil","Grafik","Kod"], a:1},
{q:"x* nedir?", options:["1","0+","Sonsuz","Yok"], a:1},
{q:"ab* nedir?", options:["a+ b","ab","a + 0+ b","b"], a:2},
{q:"(ab)* nedir?", options:["a+b","ab tekrar","a","b"], a:1},
{q:"Özyineli tanım kaç adım?", options:["1","2","3","4"], a:2},
{q:"Basis nedir?", options:["Son","İlk","Orta","Tanım"], a:1},
{q:"Inductive nedir?", options:["Başlangıç","Kural","Sonuç","Tanım"], a:1},
{q:"Tümdengelim?", options:["Özel→genel","Genel→özel","Rastgele","Sayısal"], a:1},
{q:"Çelişki ispatı?", options:["Doğru","Yanlış varsay","Rastgele","Hesap"], a:1},
{q:"(a+b)* nedir?", options:["a","b","Tüm kombinasyon","Boş"], a:2}
];

let score = 0;

const quizDiv = document.getElementById("quiz");

questions.forEach((item, index) => {
    let html = `<div class="question">
    <p>${index+1}) ${item.q}</p>`;
    
    item.options.forEach((opt, i) => {
        html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
    });

    html += `<button onclick="check(${index})">Kontrol Et</button>
    <p id="r${index}"></p>
    </div>`;

    quizDiv.innerHTML += html;
});

function check(i){
    let opts = document.getElementsByName("q"+i);
    let selected = -1;

    for(let j=0;j<opts.length;j++){
        if(opts[j].checked) selected = j;
    }

    let res = document.getElementById("r"+i);

    if(selected === -1){
        res.innerHTML="⚠️ Seçim yap!";
        return;
    }

    if(selected === questions[i].a){
        res.innerHTML="✅ Doğru!";
        res.className="correct";
    } else {
        res.innerHTML="❌ Yanlış!";
        res.className="wrong";
    }
}

function showScore(){
    score = 0;
    questions.forEach((q,i)=>{
        let opts = document.getElementsByName("q"+i);
        for(let j=0;j<opts.length;j++){
            if(opts[j].checked && j===q.a){
                score++;
            }
        }
    });

    document.getElementById("score").innerHTML = "Skor: " + score + " / 30";
}

</script>

</body>
</html>
