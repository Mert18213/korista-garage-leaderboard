<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖼️ Görüntü İşleme Quiz - İlk 20 Soru/title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

/* SAYFA GEÇİŞ */

.menu{
    text-align:center;
    margin-bottom:25px;
}

.page-btn{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.page-btn:hover{
    background:#34495e;
}

.active{
    background:#e74c3c !important;
}

/* SORULAR */

.question{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.control-btn{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.control-btn:hover{
    background:#2980b9;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>🛡️ Kriptoloji Quiz - İlk 20 Soru</h1>

<div class="menu">

<button class="page-btn active" onclick="goPage(1)">1</button>
<button class="page-btn" onclick="goPage(2)">2</button>
<button class="page-btn" onclick="goPage(3)">3</button>
<button class="page-btn" onclick="goPage(4)">4</button>
</div>



<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

/* SAYFA GEÇİŞ */

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }
    if(page === 4){

        window.location.href = "index4.html";

    }

}



/* SORULAR */

const questions = [

{
q:"Morfolojik işlemler en yaygın olarak hangi tür görüntüler üzerinde uygulanır?",
options:[
"A) RGB görüntüler",
"B) Termal görüntüler",
"C) İkili (binary) görüntüler",
"D) Çok spektrumlu görüntüler",
"E) Holografik görüntüler"
],
a:2
},

{
q:"Morfolojik genişleme (dilation) işleminin temel amacı aşağıdakilerden hangisidir?",
options:[
"A) Nesneleri küçültmek",
"B) Nesne sınırlarını genişletmek",
"C) Gürültü eklemek",
"D) Görüntüyü döndürmek",
"E) Histogramı eşitlemek"
],
a:1
},

{
q:"Morfolojik aşınma (erosion) işlemi için aşağıdakilerden hangisi doğrudur?",
options:[
"A) Nesnelerin boyutunu artırır.",
"B) Arka planı büyütür.",
"C) Renk uzayı dönüşümü sağlar.",
"D) Gürültü üretir.",
"E) Frekans analizi yapar."
],
a:1
},

{
q:"Açma (opening) işlemi hangi iki işlemin sırasıyla uygulanmasıyla elde edilir?",
options:[
"A) Genişleme → Aşınma",
"B) Aşınma → Genişleme",
"C) Aşınma → Açma",
"D) Kapama → Genişleme",
"E) Genişleme → Kapama"
],
a:1
},

{
q:"Kapama (closing) işlemi aşağıdakilerden hangisidir?",
options:[
"A) Genişleme ardından aşınma",
"B) Aşınma ardından genişleme",
"C) İki kez genişleme",
"D) İki kez aşınma",
"E) Histogram eşitleme"
],
a:0
},

{
q:"Yapı elemanı (structuring element) nedir?",
options:[
"A) Renk uzayı dönüşüm matrisi",
"B) Gürültü modeli",
"C) Morfolojik işlemlerde kullanılan şekil maskesi",
"D) FFT matrisi",
"E) Histogram grafiği"
],
a:2
},

{
q:"Renk uzayları neden üç boyutlu olarak tasarlanır?",
options:[
"A) Üç temel filtre olduğu için",
"B) RGB kameralar nedeniyle",
"C) Bir rengi tanımlamak için üç bağımsız değişken gerektiğinden",
"D) Hesaplamaları kolaylaştırdığı için",
"E) Piksel sayısını azalttığı için"
],
a:2
},

{
q:"Munsell renk sisteminde H harfi neyi ifade eder?",
options:[
"A) Hue (renk adı)",
"B) Heat (ısı)",
"C) Height (yükseklik)",
"D) Histogram",
"E) Hardness (sertlik)"
],
a:0
},

{
q:"Munsell renk sisteminde V harfi neyi temsil eder?",
options:[
"A) Velocity",
"B) Value (değer)",
"C) Vector",
"D) Variance",
"E) Vision"
],
a:1
},

{
q:"Bir rengin griden uzaklaşma derecesini ifade eden bileşen aşağıdakilerden hangisidir?",
options:[
"A) Hue",
"B) Value",
"C) Chroma",
"D) Intensity",
"E) Gamma"
],
a:2
},

{
q:"Enterpolasyonun temel amacı nedir?",
options:[
"A) Gürültü eklemek",
"B) Yeni piksel koordinatlarının değerlerini tahmin etmek",
"C) Görüntüyü sıkıştırmak",
"D) Histogram oluşturmak",
"E) Kenar bulmak"
],
a:1
},

{
q:"Bilinear enterpolasyonda kaç komşu piksel kullanılır?",
options:[
"A) 2",
"B) 3",
"C) 4",
"D) 6",
"E) 8"
],
a:2
},

{
q:"MATLAB'da görüntüyü döndürmek için kullanılan fonksiyon aşağıdakilerden hangisidir?",
options:[
"A) imshow()",
"B) imresize()",
"C) imrotate()",
"D) imnoise()",
"E) medfilt2()"
],
a:2
},

{
q:"Aşağıdakilerden hangisi görüntü bozulmalarının bir türüdür?",
options:[
"A) Sobel",
"B) Laplace",
"C) Barrel bozulması",
"D) Histogram eşitleme",
"E) Fourier dönüşümü"
],
a:2
},

{
q:"Radyal bozulmalar çoğunlukla hangi bileşenden kaynaklanır?",
options:[
"A) İşletim sistemi",
"B) Sensör sıcaklığı",
"C) Lens (objektif)",
"D) Bellek kartı",
"E) Monitör"
],
a:2
},

{
q:"Piksel komşuluk işlemlerinin temel fikri aşağıdakilerden hangisidir?",
options:[
"A) Görüntüyü sıkıştırmak",
"B) Histogram oluşturmak",
"C) Görüntü üzerinde bir maskeyi dolaştırmak",
"D) Renk uzayı değiştirmek",
"E) Dosya boyutunu azaltmak"
],
a:2
},

{
q:"Lineer filtreleme sırasında ilk adım aşağıdakilerden hangisidir?",
options:[
"A) Sonuçların toplanması",
"B) Piksel değerinin sıfırlanması",
"C) Maske yerleştirilmesi",
"D) Histogram eşitleme",
"E) Gürültü eklenmesi"
],
a:2
},

{
q:"Aşağıdakilerden hangisi lineer filtre oluşturma aşamalarından biridir?",
options:[
"A) Yapı elemanı seçimi",
"B) Sonuçların toplanması",
"C) Renk dönüşümü",
"D) Piksel silme",
"E) Segmentasyon"
],
a:1
},

{
q:"Görüntüdeki sorunlu piksellerden kaynaklanan bozulmalar genel olarak ne olarak adlandırılır?",
options:[
"A) Radyal bozulma",
"B) Dönüşüm hatası",
"C) Gürültü",
"D) Histogram hatası",
"E) Piksel eşleme"
],
a:2
},

{
q:"Genişleme işleminin çoklu uygulanması sonucunda ne elde edilebilir?",
options:[
"A) Nesneler incelir.",
"B) Görüntü renklendirilir.",
"C) Kırık nesneler birleşebilir.",
"D) Histogram düzleşir.",
"E) Renk uzayı dönüşür."
],
a:2
}

];
const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">

<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
