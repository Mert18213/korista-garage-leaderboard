<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hash Learning Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

/* SLIDES */
.slide { display: none; }
.active { display: block; }

/* NAV BUTTONS */
.nav {
    margin-top: 20px;
}
.nav button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

/* BOX */
.box {
    border: 1px solid #444;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    position: relative;
}

/* TOOLTIP ICON */
.help {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #38bdf8;
    color: black;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 14px;
    line-height: 20px;
    cursor: pointer;
}

/* TOOLTIP TEXT */
.helpText {
    display: none;
    position: absolute;
    top: 10px;
    left: 40px;
    background: #1e293b;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    white-space: nowrap;
}

.help:hover + .helpText {
    display: block;
}

input, select, button {
    padding: 10px;
    margin: 10px;
}

</style>
</head>

<body>

<h1>🔐 Hash Learning Lab</h1>

<!-- SLIDE 1 -->
<div class="slide active">
<div class="box">

<div class="help">?</div>
<div class="helpText">Hash fonksiyonları veriyi sabit uzunlukta çıktıya çevirir. Geri dönüş yoktur.</div>

<h2>Hash</h2>

<input id="text" placeholder="Metin gir">
<select id="algo">
<option value="MD5">MD5</option>
<option value="SHA1">SHA-1</option>
<option value="SHA256">SHA-256</option>
</select>

<button onclick="calculateHash()">Hesapla</button>

<p id="result"></p>

</div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<div class="box">

<div class="help">?</div>
<div class="helpText">Küçük değişiklik büyük fark yaratır (Avalanche Effect).</div>

<h2>Avalanche Effect</h2>

<button onclick="avalanche()">Test Et</button>
<p id="avalancheResult"></p>

</div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<div class="box">

<div class="help">?</div>
<div class="helpText">Collision: iki farklı veri aynı hash üretirse oluşur.</div>

<h2>Collision</h2>

<select id="length">
<option value="4">4</option>
<option value="8">8</option>
<option value="12">12</option>
</select>

<button onclick="collision()">Başlat</button>

<p id="collisionResult"></p>

</div>
</div>

<!-- NAVIGATION -->
<div class="nav">
<button onclick="prevSlide()">⬅️ Geri</button>
<button onclick="nextSlide()">İleri ➡️</button>
</div>

<script>

let slides = document.querySelectorAll(".slide");
let current = 0;

function showSlide(index){
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
}

function nextSlide(){
    if(current < slides.length - 1){
        current++;
        showSlide(current);
    }
}

function prevSlide(){
    if(current > 0){
        current--;
        showSlide(current);
    }
}

// HASH
function getHash(text, algo){
    if(algo === "MD5") return CryptoJS.MD5(text).toString();
    if(algo === "SHA1") return CryptoJS.SHA1(text).toString();
    if(algo === "SHA256") return CryptoJS.SHA256(text).toString();
}

function calculateHash(){
    let text = document.getElementById("text").value;
    let algo = document.getElementById("algo").value;

    document.getElementById("result").innerText =
        "Hash: " + getHash(text, algo);
}

// AVALANCHE
function avalanche(){
    let text = document.getElementById("text").value;
    let changed = text.slice(0, -1) + "X";

    let h1 = getHash(text, "SHA256");
    let h2 = getHash(changed, "SHA256");

    document.getElementById("avalancheResult").innerText =
        "Orijinal:\n" + h1 + "\n\nDeğişmiş:\n" + h2;
}

// RANDOM
function randomString(){
    return Math.random().toString(36).substring(2, 10);
}

// COLLISION
function collision(){

    let len = parseInt(document.getElementById("length").value);
    let seen = {};
    let count = 0;
    let start = performance.now();

    let box = document.getElementById("collisionResult");

    function step(){

        for(let i = 0; i < 2000; i++){

            let str = randomString();
            let hash = CryptoJS.SHA256(str).toString().substring(0, len);

            if(seen[hash] && seen[hash] !== str){

                let time = ((performance.now() - start)/1000).toFixed(2);

                box.innerText =
                    "🎉 Collision!\n" +
                    seen[hash] + " ≠ " + str +
                    "\nHash: " + hash +
                    "\nDeneme: " + count +
                    "\nSüre: " + time + " sn";

                return;
            }

            seen[hash] = str;
            count++;
        }

        box.innerText = "⏳ Deneme: " + count;
        requestAnimationFrame(step);
    }

    step();
}

</script>

</body>
</html>
