<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Otomata Quiz Pro - 2. Hafta</title>
<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.question { margin-bottom: 20px; padding:15px; background:white; border-radius:10px; }
button { margin-top:10px; padding:8px 12px; cursor:pointer; }
.correct { color: green; font-weight:bold; }
.wrong { color: red; font-weight:bold; }
h3 { background:#ddd; padding:10px; border-radius:8px; }

/* 🔥 HAFTA MENÜ */
.week-btn{
    padding:8px 12px;
    margin:3px;
    background:#333;
    color:white;
    border:none;
    border-radius:5px;
}
.week-btn:hover{
    background:#555;
}
.active{
    background:#e74c3c !important;
}
</style>
</head>

<body>

<h2>🧠 Otomata Quiz - 2. Hafta (İspat Yöntemleri)</h2>

<!-- 🔥 HAFTA SEÇİM MENÜ -->
<div>
<button class="week-btn" onclick="goWeek(1)">1</button>
<button class="week-btn active" onclick="goWeek(2)">2</button>
<button class="week-btn" onclick="goWeek(3)">3</button>
<button class="week-btn" onclick="goWeek(4)">4</button>
<button class="week-btn" onclick="goWeek(5)">5</button>
<button class="week-btn" onclick="goWeek(6)">6</button>
<button class="week-btn" onclick="goWeek(7)">7</button>
<button class="week-btn" onclick="goWeek(8)">8</button>
<button class="week-btn" onclick="goWeek(9)">9</button>
<button class="week-btn" onclick="goWeek(10)">10</button>
<button class="week-btn" onclick="goWeek(11)">11</button>
</div>

<div id="quiz"></div>

<button onclick="showScore()">📊 Skoru Göster</button>
<p id="score"></p>

<script>

// 🔁 HAFTA GEÇİŞ
function goWeek(w){
    if(w === 1){
        window.location.href = "index.html"; // 2. hafta
    } else {
        window.location.href = "index" + w + ".html"; 
        // 2 → index2 (3. hafta)
        // 3 → index3 (4. hafta)
    }
}

const questions = [

{q:"Tümdengelim (deductive proof) aşağıdakilerden hangisidir?",
options:[
"Özelden genele gitme yöntemidir",
"Genel öncüllerden özel sonuç çıkarma yöntemidir",
"Deney yaparak sonuca ulaşmadır",
"Çelişki kurarak sonuca ulaşmadır"
], a:1},

{q:"“If A then B” ifadesini ispatlamak için hangi yöntem uygulanır?",
options:[
"A yanlış kabul edilir",
"B yanlış kabul edilir",
"A doğru kabul edilip B’nin doğru olduğu gösterilir",
"A ve B birlikte yanlış kabul edilir"
], a:2},

{q:"Çelişki ile ispat (proof by contradiction) yönteminde ilk adım nedir?",
options:[
"Teorem doğru kabul edilir",
"Sonuç doğru kabul edilir",
"Teorem yanlış kabul edilir",
"Hipotez yanlış kabul edilir"
], a:2},

{q:"Aşağıdakilerden hangisi çelişki ile ispata örnektir?",
options:[
"x ≥ 4 ise 2x ≥ x²",
"2 asal sayıdır",
"Bir kümenin tümleyeni sonsuzdur varsayımından çelişki elde etmek",
"x + y = y + x"
], a:2},

{q:"“A ancak ve ancak B” ifadesinin ispatı için ne yapılmalıdır?",
options:[
"Sadece A → B ispatlanır",
"Sadece B → A ispatlanır",
"A → B ve B → A ayrı ayrı ispatlanır",
"Sadece örnek verilmesi yeterlidir"
], a:2},

{q:"Aşağıdakilerden hangisi karşı örnek (counterexample) yöntemidir?",
options:[
"Tüm durumları incelemek",
"En az bir yanlış örnek bulmak",
"Sonsuz örnek üretmek",
"Deney yapmak"
], a:1},

{q:"“Tüm asal sayılar tektir” önermesinin yanlış olduğunu nasıl gösteririz?",
options:[
"Tümevarım ile",
"Tümdengelim ile",
"Karşı örnek ile (2 sayısı)",
"Çelişki ile"
], a:2},

{q:"Tümevarım (induction) yöntemi hangi yapılarla ilgilidir?",
options:[
"Rastgele sayılar",
"Deneysel veriler",
"Özyineli (recursive) tanımlar",
"Grafikler"
], a:2},

{q:"Tümevarım yönteminde aşağıdakilerden hangisi bulunmaz?",
options:[
"Başlangıç (basis) adımı",
"Tümevarım adımı",
"Karşı örnek",
"Genelleme"
], a:2},

{q:"Aşağıdakilerden hangisi tümevarım adımıdır?",
options:[
"İlk durumun doğru olduğunu göstermek",
"n doğruysa n+1’in de doğru olduğunu göstermek",
"Tüm durumları tek tek denemek",
"Çelişki kurmak"
], a:1}

];

let score = 0;
const quizDiv = document.getElementById("quiz");

quizDiv.innerHTML += "<h3>📘 2. Hafta - İspat Yöntemleri</h3>";

questions.forEach((item, index) => {

    let html = `<div class="question">
    <p>${index+1}) ${item.q}</p>`;
    
    item.options.forEach((opt, i) => {
        html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
    });

    html += `<button onclick="check(${index})">Kontrol Et</button>
    <p id="r${index}"></p>
    </div>`;

    quizDiv.innerHTML += html;
});

function check(i){
    let opts = document.getElementsByName("q"+i);
    let selected = -1;

    for(let j=0;j<opts.length;j++){
        if(opts[j].checked) selected = j;
    }

    let res = document.getElementById("r"+i);

    if(selected === -1){
        res.innerHTML="⚠️ Seçim yap!";
        return;
    }

    if(selected === questions[i].a){
        res.innerHTML="✅ Doğru!";
        res.className="correct";
    } else {
        res.innerHTML="❌ Yanlış!";
        res.className="wrong";
    }
}

function showScore(){
    score = 0;
    questions.forEach((q,i)=>{
        let opts = document.getElementsByName("q"+i);
        for(let j=0;j<opts.length;j++){
            if(opts[j].checked && j===q.a){
                score++;
            }
        }
    });

    document.getElementById("score").innerHTML = "Skor: " + score + " / 10";
}

</script>

</body>
</html>
