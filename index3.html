<body>

<h1>🖼️ Görüntü İşleme - Sayfa 3</h1>

<div class="menu">

<button class="page-btn" onclick="goPage(1)">1</button>
<button class="page-btn" onclick="goPage(2)">2</button>
<button class="page-btn active" onclick="goPage(3)">3</button>
<button class="page-btn" onclick="goPage(4)">4</button>

</div>

<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }

    if(page === 4){

        window.location.href = "index4.html";

    }

}

const questions = [

{

"D) Negatif sonsuza gider",
"E) Sabit kalır"
],

},

{

"A) Maksimum değer",
"B) Minimum değer",
"C) Ortalama değer",
"D) Sıfır geçiş noktaları",
"E) Gürültü"
],
a:3
},

{
q:"Gradient metodu kenarları nasıl belirler?",
options:[
"A) Histogramı eşitleyerek",
"B) Birinci türevdeki maksimum ve minimumları bularak",

"D) Median filtre ile",
"E) Eşikleme ile"
],

},

{
q:"Laplace yöntemi kenarları nasıl belirler?",
options:[
"A) Renk farklarına göre",
"B) Histogram kullanarak",
"C) İkinci türevdeki sıfır geçişlerini kullanarak",
"D) Median filtre ile",
"E) Sobel maskesi ile"
],
a:2
},

{
q:"LoG yönteminde önce hangi işlem uygulanır?",
options:[
"A) Sobel filtresi",
"B) Gaussian filtre",
"C) Median filtre",
"D) FFT dönüşümü",
"E) Histogram eşitleme"
],
a:1
},

{
q:"Median filtre aşağıdakilerden hangisine örnektir?",
options:[
"A) Doğrusal filtre",
"B) Adaptif histogram",
"C) Doğrusal olmayan filtre",
"D) Frekans filtresi",
"E) Morfolojik filtre"
],
a:2
},

{
q:"Mean filtre görüntü üzerinde nasıl bir etki oluşturur?",
options:[
"A) Keskinleştirir",
"B) Yumuşatır",
"C) Döndürür",
"D) Segmentasyon yapar",
"E) Kenarları artırır"
],
a:1
},

{
q:"Wiener filtresi temel olarak ne için kullanılır?",
options:[
"A) Histogram oluşturmak",
"B) Gürültüyü azaltmak",
"C) Kenar bulmak",
"D) Görüntüyü büyütmek",
"E) Renk dönüşümü"
],
a:1
},

{
q:"Notch filtreler hangi amaçla kullanılır?",
options:[
"A) Renk dönüşümü",
"B) Belirli frekanslardaki gürültüyü bastırmak",
"C) Histogram eşitleme",
"D) Eşikleme",
"E) Morfolojik genişleme"
],
a:1
},

{
q:"Band-stop filtre ne yapar?",
options:[

"E) Kenarları güçlendirir"
],
a:2
},

{
q:"Sobel operatörü hangi türeve dayanır?",
options:[

"D) Sıfırıncı türev",

],
a:2
},

{
q:"Prewitt operatöründe vertical seçeneği hangi kenarları belirler?",
options:[
"A) Dairesel kenarları",
"B) Eğrisel kenarları",
"C) Dikey kenarları",
"D) Yatay kenarları",
"E) Gürültüleri"
],
a:2
},

{
q:"Segmentasyon teknikleri genel olarak kaç ana gruba ayrılır?",
options:[
"A) 2",
"B) 3",
"C) 4",
"D) 5",
"E) 6"
],
a:0
},

{

],

},

{
q:"Morfolojik kapama işlemi hangi amaçla kullanılabilir?",
options:[

"C) Renk dönüşümü yapmak",
"D) Sobel uygulamak",
"E) FFT hesaplamak"
],
a:0
},

{
q:"Gaussian gürültüsünde M parametresi neyi ifade eder?",
options:[
"A) Median",

"C) Ortalama",
"D) Minimum değer",
"E) Mod"
],
a:2
},

{
q:"Gaussian gürültüsünde V parametresi neyi ifade eder?",
options:[
"A) Vektör sayısı",
"B) Varyans",

"E) Value"
],
a:1
},

{
q:"Aşağıdakilerden hangisi görüntü işleme uygulama alanlarından biri değildir?",

],

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">

<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
