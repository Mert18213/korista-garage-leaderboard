<script>

const questions = [

{
q:"Blockchain’de değiştirilemezlik (immutability) hangi mekanizma sayesinde sağlanır?",
options:[
"A) Sadece kripto para kullanımı",
"B) Merkezi sunucu kontrolü",
"C) Blokların hash ile birbirine bağlanması",
"D) İnternet bağlantısı",
"E) Kullanıcı şifreleri"
],
a:2
},

{
q:"Aşağıdakilerden hangisi Proof of Work sisteminin temel zayıflıklarından biridir?",
options:[
"A) Düşük güvenlik",
"B) Merkezi kontrol",
"C) Yüksek enerji tüketimi",
"D) Veri kaybı",
"E) Şeffaflık eksikliği"
],
a:2
},

{
q:"Blockchain’de “double spending” problemi neyi ifade eder?",
options:[
"A) Aynı verinin iki kez silinmesi",
"B) Aynı dijital varlığın birden fazla kez harcanmaya çalışılması",
"C) Verinin iki farklı blokta saklanması",
"D) İki farklı blockchain kullanılması",
"E) İşlem ücretinin iki kez ödenmesi"
],
a:1
},

{
q:"Proof of Stake (PoS) sisteminde blok üretme hakkı neye göre belirlenir?",
options:[
"A) İnternet hızına göre",
"B) İşlem sayısına göre",
"C) Kilitlenen (stake edilen) coin miktarına göre",
"D) Donanım gücüne göre",
"E) Kullanıcı sayısına göre"
],
a:2
},

{
q:"Blockchain Trilemma neyi ifade eder?",
options:[
"A) Üç farklı kripto para türünü",
"B) Üç farklı saldırı türünü",
"C) Güvenlik, ölçeklenebilirlik ve merkeziyetsizlik arasında denge kurma zorluğunu",
"D) Üç farklı hash algoritmasını",
"E) Üç farklı node tipini"
],
a:2
},

{
q:"Needham-Schroeder protokolünün temel tasarım amacı aşağıdakilerden hangisidir?",
options:[
"A) Veri sıkıştırma oranını artırmak.",
"B) İki taraf arasında karşılıklı kimlik doğrulama sağlamak.",
"C) Şifreleme algoritmalarının matematiksel hızını ölçmek.",
"D) Ağ üzerindeki trafik yoğunluğunu azaltmak.",
"E) Sadece verinin bütünlüğünü kontrol etmek."
],
a:1
},

{
q:"Lowe Saldırısı’nın temel sebebi aşağıdakilerden hangisidir?",
options:[
"A) RSA algoritmasının matematiksel olarak kırılması.",
"B) Kullanılan rastgele sayıların (nonce) tahmin edilebilir olması.",
"C) Protokol tasarımındaki bağlamsal doğrulama eksikliği.",
"D) İnternet hızının düşük olması nedeniyle paket kaybı yaşanması.",
"E) Simetrik anahtar paylaşımı sırasında anahtarın çalınması."
],
a:2
},

{
q:"Dolev-Yao tehdit modeline göre, aşağıdakilerden hangisi bir saldırganın yapabileceği eylemlerden biri değildir?",
options:[
"A) Ağ üzerindeki mesajları yakalamak.",
"B) Mesajları değiştirerek tekrar göndermek.",
"C) Kendisini başka bir kullanıcı gibi tanıtmak.",
"D) Şifreleme algoritmasını matematiksel olarak çözerek gizli anahtarı ele geçirmek.",
"E) İletişim kanalı üzerindeki trafiği izlemek."
],
a:3
},

{
q:"Lowe saldırısı senaryosunda, Bob (B) neden güvenlik ihlalini fark edememektedir?",
options:[
"A) Çünkü Alice’in (A) gizli anahtarı çalınmıştır.",
"B) Bob, kendisine gelen mesajın Alice tarafından doğrudan gönderildiğini varsayar ve mesajın bağlamını doğrulayamaz.",
"C) Saldırgan (I), şifreleme algoritmasını kırmıştır.",
"D) Bob’un kullandığı sistemde antivirüs yazılımı yoktur.",
"E) Nonce değerleri (Na ve Nb) her zaman aynı üretilmektedir."
],
a:1
},

{
q:"Formel modellemede kullanılan A -> B : {Na , A}Kb desi neyi temsil eder?",
options:[
"A) A’nın B’ye, B’nin açık anahtarı (Kb) ile şifrelenmiş bir mesaj gönderdiğini.",
"B) B’nin A’ya, A’nın gizli anahtarı ile şifrelenmiş bir dosya gönderdiğini.",
"C) A ve B’nin aynı anahtarı kullanarak şifreleme yaptığını.",
"D) Mesajın ağda herkes tarafından okunabilir olduğunu.",
"E) Nonce değerinin (Na) herkese açık bir metin olduğunu."
],
a:0
},

{
q:"Diffie-Hellman güvenliği hangi probleme dayanır?",
options:[
"A) NP-Complete Problemler",
"B) Ayrık Logaritma Problemi",
"C) RSA Faktörizasyon Problemi",
"D) Lineer Denklem Sistemler"
],
a:1
},

{
q:"Diffie-Hellman protokolü neden MITM saldırılarına açıktır?",
options:[
"A) Şifreleme algoritması zayıf olduğu için",
"B) Açık anahtarlar gizli tutulmadığı için",
"C) Kimlik doğrulama (authentication) mekanizması olmadığı için",
"D) Ağ gecikmesi yüksek olduğu için"
],
a:2
},

{
q:"MITM saldırısında saldırganın başarılı olmasının temel sebebi nedir?",
options:[
"A) Saldırganın iki tarafla ayrı ayrı anahtar oluşturabilmesi",
"B) Anahtar uzunluğunun kısa olması",
"C) Şifreleme algoritmasının deterministik olması",
"D) Ağ paketlerinin şifrelenmemesi"
],
a:0
},

{
q:"Anahtar boyutu arttıkça performans neden düşer?",
options:[
"A) Bellek kullanımı azalır",
"B) Ağ trafiği tamamen durur",
"C) Modüler üs alma işlemi daha maliyetli hale gelir",
"D) Şifreleme işlemi lineer hale gelir"
],
a:2
},

{
q:"Diffie-Hellman algoritmasını MITM saldırılarına karşı güvenli hale getirmek için hangisi kullanılır?",
options:[
"A) Tek başına hash fonksiyonları",
"B) Simetrik şifreleme algoritmaları",
"C) Sadece daha uzun anahtar kullanımı",
"D) Dijital imzalar ve sertifika altyapısı (PKI)"
],
a:3
},

{
q:"Aynı şifreyi kullanan iki kullanıcı veritabanına kaydedildiğinde, plain hash (SHA-256, salt yok) ve salt+hash yöntemlerinde ne gözlemlenir?",
options:[
"A) Her iki yöntemde de hash değerleri farklı olur, SHA-256 rastgele çıktı üretir.",
"B) Plain hash’te her iki kullanıcı için aynı hash oluşur; salt+hash’te farklı salt nedeniyle farklı hash oluşur.",
"C) Salt+hash’te de hash değerleri aynı olur; salt yalnızca depolama boyutunu artırır.",
"D) Plain hash’te farklı, salt+hash’te aynı hash oluşur; salt belirleyicidir."
],
a:1
},

{
q:"Aşağıdakilerden hangisi plain hash (SHA-256) yönteminin en önemli güvenlik zafiyetidir?",
options:[
"A) Çok yavaş çalışması",
"B) Aynı parolaların farklı hash üretmesi",
"C) Aynı parolaların aynı hash üretmesi",
"D) Salt kullanılması zorunluluğu"
],
a:2
},

{
q:"Aşağıdaki senaryolardan hangisi bcrypt kullanımının en büyük avantajını en doğru şekilde açıklar?",
options:[
"A) Hash çıktısını daha kısa hale getirmesi",
"B) Aynı parolaların aynı hash üretmesini sağlaması",
"C) Salt kullanımını tamamen ortadan kaldırması",
"D) Hesaplama süresini artırarak brute force saldırısını zorlaştırması"
],
a:3
},

{
q:"Bir sistemde aşağıdaki özellikler bulunmaktadır: Salt kullanılıyor, bcrypt kullanılıyor, Parolalar kısa (örneğin 4 karakter). Bu sistem için aşağıdakilerden hangisi en doğru yorumdur?",
options:[
"A) Sistem güçlüdür ancak zayıf parolalar nedeniyle risklidir",
"B) Salt kullanıldığı için parola uzunluğu önemli değildir",
"C) Sistem tamamen güvenlidir",
"D) Brute force saldırısı imkansızdır"
],
a:0
},

{
q:"Aşağıdaki algoritmalardan hangisi brute force saldırılarına karşı en dayanıklı olarak kabul edilir?",
options:[
"A) SHA-256",
"B) MD5",
"C) bcrypt",
"D) Base64"
],
a:2
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">

<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
