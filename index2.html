<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kriptoloji Quiz - Sayfa 2</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

.menu{
    text-align:center;
    margin-bottom:25px;
}

.page-btn{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#2c3e50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.page-btn:hover{
    background:#34495e;
}

.active{
    background:#e74c3c !important;
}

.question{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.control-btn{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.control-btn:hover{
    background:#2980b9;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>🛡️ Kriptoloji Quiz - Sayfa 2</h1>

<div class="menu">

<button class="page-btn" onclick="goPage(1)">1</button>
<button class="page-btn active" onclick="goPage(2)">2</button>
<button class="page-btn" onclick="goPage(3)">3</button>
<button class="page-btn" onclick="goPage(4)">4</button>
</div>

<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }

}

const questions = [

{
q:"Aşağıdakilerden hangisi gerçek rastgele sayı üreteci (TRNG) için doğrudur?",
options:[
"A) Matematiksel formüllerle çalışır.",
"B) Aynı seed ile aynı sonucu üretir.",
"C) Fiziksel olaylardan rastgelelik elde eder.",
"D) Her zaman hızlı çalışır.",
"E) Deterministik yapıdadır."
],
a:2
},

{
q:"Aşağıdakilerden hangisi PRNG’nin dezavantajlarından biridir?",
options:[
"A) Çok yavaş çalışması",
"B) Tahmin edilebilir olması",
"C) Donanım gerektirmesi",
"D) Rastgelelik üretmemesi",
"E) Hiç tekrar etmemesi"
],
a:1
},

{
q:"Aşağıdaki testlerden hangisi, bit dizisinde 0 ve 1’lerin dengeli dağılıp dağılmadığını kontrol eder?",
options:[
"A) Koşu (Runs) Testi",
"B) Otokorelasyon Testi",
"C) Blok Frekans Testi",
"D) Yaklaşık Entropi Testi",
"E) Frekans (Monobit) Testi"
],
a:4
},

{
q:"Bir bit dizisinde çok uzun 0 veya 1 bloklarının bulunması hangi durumu gösterir?",
options:[
"A) Yüksek entropi",
"B) İdeal rastgelelik",
"C) Koşu testinde başarısızlık",
"D) Monobit testinin başarılı olması",
"E) Güvenli CSPRNG çıktısı"
],
a:2
},

{
q:"Aşağıdaki durumlardan hangisi bir rastgele sayı üreticinin zayıf olduğunu en iyi gösterir?",
options:[
"A) Üretilen sayıların hızlı olması",
"B) Aynı başlangıç değeri ile aynı dizinin elde edilmesi",
"C) Sayıların belirli aralıkta üretilmesi",
"D) İstatistiksel testlerden geçmesi",
"E) Entropisinin yüksek olması"
],
a:1
},

{
q:"RSA algoritmasının güvenliğinin dayandığı temel matematiksel zorluk nedir?",
options:[
"A. İki büyük asal sayıyı çarpmanın zorluğu.",
"B. Büyük sayıların asal çarpanlara ayrılmasının zorluğu.",
"C. Açık anahtarla şifrelenmiş veriyi çözmenin zorluğu.",
"D. Dijital imzaların doğrulanmasının zorluğu."
],
a:1
},

{
q:"Dijital imza sisteminde ‘Açık Anahtar’ (Public Key) neden tehlike arz etmeden herkesle rahatlıkla paylaşılabilir?",
options:[
"A) Çünkü açık anahtar sadece veri şifrelemek için kullanılır.",
"B) Açık anahtar kullanılarak gizli anahtarın hesaplanması matematiksel olarak pratik değildir.",
"C) Açık anahtar, gizli anahtarla aynı matematiksel yapıya sahiptir.",
"D) Açık anahtarın paylaşılması yasal bir zorunluluktur."
],
a:1
},

{
q:"İşlevsel bir dijital imza oluşturma ve ardından doğrulama sürecinin teknik olarak doğru adım sıralaması nedir?",
options:[
"A. Mesajın özeti alınır -> Gizli anahtarla özet şifrelenir -> İletilir -> Açık anahtarla özet çözülür ve karşılaştırılır.",
"B. Mesaj şifrelenir -> Gizli anahtarla özet şifrelenir -> İletilir -> Açık anahtarla çözülür.",
"C. Mesajın özeti alınır -> Açık anahtarla özet şifrelenir -> İletilir -> Gizli anahtarla çözülür ve karşılaştırılır.",
"D. Gizli anahtarla mesaj şifrelenir -> İletilir -> Açık anahtarla mesaj çözülür."
],
a:0
},

{
q:"Bir yazılım güncellemesi indirildiğinde, orijinal özet ile indirilen dosyanın mevcut özeti eşleşmezse sistemin varması gereken sonuç nedir?",
options:[
"A) Dosya bütünlüğünün bozulduğu ve işlemin iptal edilmesi gerektiği.",
"B) Güncellemenin başarılı bir şekilde tamamlandığı ve kuruluma hazır olduğu.",
"C) Dosyanın şifrelenmiş olduğu ve açılması için gizli anahtarın beklendiği.",
"D) Ağ bağlantısında geçici bir sorun olduğu ve indirme işleminin tekrar denenmesi gerektiği."
],
a:0
},

{
q:"ECB modunun deterministik yapısı nedeniyle görsel verilerde ortaya çıkan ve orijinal silüetin şifreli metinde gizlenememesine yol açan güvenlik zafiyeti aşağıdakilerden hangisidir?",
options:[
"A) Örüntü Sızıntısı (Pattern Leakage)",
"B) Dolgu Hatası (Padding Oracle)",
"C) Anahtar Tekrarı (Key Reuse)",
"D) Çığ Etkisi (Avalanche Effect)"
],
a:0
},

{
q:"CBC modunda iletim sırasında şifreli metin bloğunda oluşan tek bir bitlik hata, deşifreleme aşamasında veriyi nasıl etkiler?",
options:[
"A) Sadece hatanın olduğu spesifik bit bozar, diğer bloklara yayılmaz.",
"B) Tüm mesaj tamamen okunamaz ve anlamsız hale gelir.",
"C) Kendi bloğunu tamamen bozar, bir sonraki bloğun ise sadece ilgili bitini etkiler.",
"D) Hata izolasyonu sayesinde mesaj hiçbir bozulma yaşamaz."
],
a:2
},

{
q:"CBC ve CTR modlarında, açık metin veya şifreli metnin diğer bloklar veya anahtar akışıyla (keystream) birleştirilmesinde kullanılan temel mantıksal işlem aşağıdakilerden hangisidir?",
options:[
"A) AND",
"B) OR",
"C) XOR",
"D) MOD"
],
a:2
},

{
q:"CTR (Counter) modunda, şifreleme sürecinde mesajın içeriği (açık metin) yerine öncelikli olarak ne şifrelenir?",
options:[
"A) Başlangıç Vektörü (IV)",
"B) Verinin uzunluk bilgisi",
"C) Her blok için farklı değer alan bir “sayaç” (counter)",
"D) Hedef bilgisayarın IP adresi"
],
a:2
},

{
q:"Hız (performans) analizlerine göre, CTR modunun hem şifreleme hem de deşifreleme aşamalarında en düşük işlem süresine (en yüksek hıza) sahip olmasının yapısal nedeni nedir?",
options:[
"A) Çok düşük boyutlu anahtarlar kullanması",
"B) Görselleri kalitesini düşürerek işlem yapması",
"C) Bloklar arası zincirleme bağımlılık olmadan paralel işlemeye izin vermesi",
"D) Tarayıcı belleğini (RAM) kullanmadan doğrudan işlemde çalışması"
],
a:2
},

{
q:"Eksik blokları tamamlama mekanizmasına dayanan ve milyonlarca deneme yanılma sonucunda AES anahtarı bilinmeden dahi CBC modundaki şifreli metnin çözülmesine olanak tanıyan ünlü saldırı türü hangisidir?",
options:[
"A) Kusursuz Bit-Flipping Saldırısı",
"B) Örüntü Sızıntısı Analizi",
"C) Padding Oracle Saldırısı",
"D) Steganografi Manipülasyonu"
],
a:2
},

{
q:"ECB modunda örüntü sızıntısının (pattern leakage) engellenemesinin yapısal temel aşağıdakilerden hangisidir?",
options:[
"A) Dolgu (padding) kullanmaması",
"B) Deterministik yapıda çalışması",
"C) Akış şifresi (stream) üretmemesi",
"D) Şifrelemede XOR işlemini atlaması"
],
a:1
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">
<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
