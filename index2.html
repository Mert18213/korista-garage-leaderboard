```html
<!DOCTYPE html>

<style>

<body>

<h1>🛡️ Kriptoloji Quiz - İlk 20 Soru</h1>

<div id="quiz"></div>

<button onclick="showScore()">📊 Skoru Göster</button>
<h2 id="score"></h2>

<script>

const questions = [

{
q:"SHA-256'nın teorik çakışma direnci kaçtır?",
options:["2^256","2^128","2^64","2^512"],
a:1
},

{
q:"Merkle-Damgård mimarisini kullanmayan hangisidir?",
options:["MD5","SHA-1","SHA-256","SHA-3"],
a:3
},

{
q:"SHA-1 için ilk pratik collision saldırısının adı nedir?",
options:["Heartbleed","EternalBlue","SHAttered","Spectre"],
a:2
},

{
q:"1 bit değiştiğinde hash çıktısının büyük ölçüde değişmesine ne denir?",
options:["Determinizm","Avalanche Effect","Padding","Collision"],
a:1
},

{
q:"Kuantum bilgisayarlarda hash güvenliğini azaltan algoritma hangisidir?",
options:["RSA","AES","Grover","Diffie-Hellman"],
a:2
},

{
q:"Perfect secrecy hangi durumu ifade eder?",
options:[
"Algoritmanın gizli tutulması",
"Şifreli metnin değişmemesi",
"Anahtarın mutlaka 128 bit olması",
"Mesajın şifretextten öğrenilememesi"
],
a:3
},

{
q:"OTP'nin perfect secrecy sağlaması için hangisi gerekir?",
options:[
"Mesajın uzun olması",
"Anahtarın herkese açık olması",
"Anahtarın bir kez kullanılması",
"Anahtarın kısa olması"
],
a:2
},

{
q:"Shift Cipher neden perfect secrecy sağlayamaz?",
options:[
"XOR kullanılmadığı için",
"Anahtar uzayı çok küçük olduğu için",
"Her zaman çevrildiği için",
"Çözme işlemi olmadığı için"
],
a:1
},

{
q:"H(M|C)=H(M) ifadesi neyi gösterir?",
options:[
"Ciphertext mesaj hakkında bilgi sızdırır",
"Mesaj mutlaka tek harflidir",
"Sistem çözülemez ama bilgi sızar",
"Ciphertext mesaj hakkında bilgi sızdırmaz"
],
a:3
},

{
q:"OTP ile Shift Cipher arasındaki temel fark nedir?",
options:[
"OTP frekans analizi bırakmaz",
"OTP yalnızca İngilizce çalışır",
"Shift Cipher anahtarsızdır",
"Entropi sadece Shift'te hesaplanır"
],
a:0
},

{
q:"Kuantum bilgisayarların RSA’yı kırmasını sağlayan algoritma hangisidir?",
options:["Kyber","ML-KEM","SHOR","AES"],
a:2
},

{
q:"NIST tarafından standart kabul edilen anahtar kapsülleme mekanizması nedir?",
options:["Kyber ML-KEM","AES-256","RSA-4096","SHOR"],
a:0
},

{
q:"Kyber algoritmasının en büyük fiziksel dezavantajı nedir?",
options:[
"CPU sıcaklığını artırması",
"Açık anahtar ve şifreli metin boyutlarının büyük olması",
"Sadece kısa metin şifreleyebilmesi",
"Anahtar üretiminin çok uzun sürmesi"
],
a:1
},

{
q:"RSA ve Kyber’ın birlikte kullanıldığı geçiş dönemi mimarisine ne denir?",
options:[
"Asimetrik Şifreleme",

"Hibrit Şifreleme"
],
a:3
},

{
q:"Kyber’ın güvenliği hangi matematiksel probleme dayanır?",
options:[
"Eliptik Eğri",
"Kafes Tabanlı Problemler",
"Ayrık Logaritma",
"Hash Çarpışması"
],
a:1
},

{
q:"TRNG için hangisi doğrudur?",
options:[
"Matematiksel formüllerle çalışır",
"Aynı seed ile aynı sonucu üretir",
"Fiziksel olaylardan rastgelelik elde eder",
"Deterministiktir"
],
a:2
},

{
q:"PRNG'nin dezavantajı nedir?",
options:[
"Çok yavaş çalışması",
"Tahmin edilebilir olması",
"Donanım gerektirmesi",
"Rastgelelik üretmemesi"
],
a:1
},

{
q:"0 ve 1'lerin dengeli dağılıp dağılmadığını hangi test kontrol eder?",
options:[

"Monobit Testi"
],
a:3
},

{
q:"Uzun 0 veya 1 bloklarının bulunması hangi problemi gösterir?",
options:[
"Yüksek entropi",
"İdeal rastgelelik",
"Koşu testinde başarısızlık",
"Güvenli çıktı"
],
a:2
},

{
q:"Rastgele sayı üreticisinin zayıf olduğunu en iyi hangi durum gösterir?",
options:[
"Hızlı çalışması",
"Aynı seed ile aynı çıktıyı vermesi",
"İstatistiksel testlerden geçmesi",
"Entropisinin yüksek olması"
],
a:1
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

    let html = `
    <div class="question">
        <h3>${index+1}) ${item.q}</h3>
    `;

    item.options.forEach((opt,i)=>{
        html += `
        <label>
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
        </label><br>
        `;
    });

    html += `
    <button onclick="checkAnswer(${index})">Kontrol Et</button>
    <p id="result${index}"></p>
    </div>
    `;

    quiz.innerHTML += html;
});

function checkAnswer(index){

    const options = document.getElementsByName("q"+index);
    let selected = -1;

    for(let i=0;i<options.length;i++){
        if(options[i].checked){
            selected = i;
        }
    }

    const result = document.getElementById("result"+index);

    if(selected === -1){
        result.innerHTML = "⚠️ Bir seçenek seç!";
        return;
    }

    if(selected === questions[index].a){
        result.innerHTML = "✅ Doğru!";
        result.className = "correct";
    }else{
        result.innerHTML = "❌ Yanlış!";
        result.className = "wrong";
    }
}

function showScore(){

    let score = 0;

    questions.forEach((q,index)=>{

        const options = document.getElementsByName("q"+index);

        for(let i=0;i<options.length;i++){

            if(options[i].checked && i===q.a){
                score++;
            }
        }
    });

    document.getElementById("score").innerHTML =
    "Skorunuz: " + score + " / 20";
}

</script>

</body>
</html>
