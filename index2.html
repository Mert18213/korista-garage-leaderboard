<!DOCTYPE html>
<html lang="tr">
<head>

<title>🖼️ Görüntü İşleme Quiz - 2. 20 Soru</title>

<style>

}

</style>

</head>

<body>

<h1>🖼️ Görüntü İşleme - Sayfa 2</h1>

<div class="menu">

<button class="page-btn" onclick="goPage(1)">1</button>
<button class="page-btn active" onclick="goPage(2)">2</button>
<button class="page-btn" onclick="goPage(3)">3</button>
<button class="page-btn" onclick="goPage(4)">4</button>
</div>

<div id="quiz"></div>

<button class="control-btn" onclick="showScore()">
📊 Skoru Göster
</button>

<h2 id="score"></h2>

<script>

function goPage(page){

    if(page === 1){

        window.location.href = "index.html";

    }

    if(page === 2){

        window.location.href = "index2.html";

    }

    if(page === 3){

        window.location.href = "index3.html";

    }
    if(page === 4){

        window.location.href = "index4.html";

    }

}
const questions = [

{
q:"Sayısal görüntü nedir?",
options:[
"A) Analog kameradan alınan görüntü",
"B) Sadece renkli görüntü",
"C) Sayısal değerlerden oluşan ve bilgisayarda görüntülenebilen görüntü",
"D) Üç boyutlu görüntü",
"E) Film üzerine kaydedilen görüntü"
],
a:2
},

{
q:"RGB renk modelinde aşağıdaki renklerden hangisi temel renklerden biri değildir?",
options:[
"A) Kırmızı",
"B) Yeşil",
"C) Mavi",
"D) Sarı",
"E) Hiçbiri"
],
a:3
},

{
q:"Histogram eşitlemenin temel amacı nedir?",
options:[
"A) Dosya boyutunu küçültmek",
"B) Kontrastı artırmak",
"C) Gürültü eklemek",
"D) Görüntüyü döndürmek",
"E) Kenar bulmak"
],
a:1
},

{
q:"Logaritmik dönüşüm koyu bölgelerde nasıl bir etki oluşturur?",
options:[
"A) Kontrastı azaltır",
"B) Koyu bölgeleri daha koyu yapar",
"C) Koyu bölgelerin kontrastını artırır",
"D) Görüntüyü bulanıklaştırır",
"E) Renkleri yok eder"
],
a:2
},

{
q:"Bir görüntüde ani gri seviye değişimlerinin bulunduğu bölgeler ne olarak adlandırılır?",
options:[
"A) Histogram",
"B) Gürültü",
"C) Kenar",
"D) Doku",
"E) Segment"
],
a:2
},

{
q:"Aşağıdakilerden hangisi birinci türeve dayalı kenar belirleme yöntemidir?",
options:[
"A) Laplace",
"B) LoG",
"C) Sobel",
"D) Zero Crossing",
"E) Gaussian"
],
a:2
},

{
q:"Prewitt operatörü temel olarak ne için kullanılır?",
options:[
"A) Histogram eşitleme",
"B) Kenar belirleme",
"C) Gürültü ekleme",
"D) Segmentasyon",
"E) Döndürme"
],
a:1
},

{
q:"İkinci türeve dayalı kenar belirleme yöntemi hangisidir?",
options:[
"A) Sobel",
"B) Prewitt",
"C) Roberts",
"D) Laplace",
"E) Canny"
],
a:3
},

{
q:"LoG yöntemindeki 'G' harfi neyi ifade eder?",
options:[
"A) Gradient",
"B) Gray",
"C) Gaussian",
"D) Gamma",
"E) Geometry"
],
a:2
},

{
q:"Segmentasyonun temel amacı nedir?",
options:[
"A) Dosya boyutunu küçültmek",
"B) Nesneleri arka plandan ayırmak",
"C) Gürültü eklemek",
"D) Görüntüyü büyütmek",
"E) Görüntüyü döndürmek"
],
a:1
},

{
q:"Eşikleme (thresholding) işlemi genellikle hangi özelliğe dayanır?",
options:[
"A) Şekil",
"B) Doku",
"C) Parlaklık",
"D) Boyut",
"E) Gürültü"
],
a:2
},

{
q:"Salt-Pepper gürültüsünü gidermede en etkili filtre hangisidir?",
options:[
"A) Gaussian filtre",
"B) Mean filtre",
"C) Median filtre",
"D) Motion filtre",
"E) Unsharp filtre"
],
a:2
},

{
q:"Gaussian gürültüsü genellikle hangi sebeple oluşur?",
options:[
"A) Lens bozulması",
"B) Elektriksel etkiler",
"C) Düşük çözünürlük",
"D) JPEG sıkıştırması",
"E) Histogram eşitleme"
],
a:1
},

{
q:"Unsharp filtre hangi amaçla kullanılır?",
options:[
"A) Gürültü gidermek",

"C) Renk dönüşümü yapmak",
"D) Segmentasyon yapmak",
"E) Histogram eşitlemek"
],
a:1
},

{
q:"Motion filtresi görüntü üzerinde nasıl bir etki oluşturur?",
options:[
"A) Negatif görüntü",

"E) Renk dönüşümü"
],
a:2
},

{

"E) Fast Frequency Technique"
],

},

{
q:"Periyodik gürültülerin giderilmesinde hangi filtreleme yöntemi tercih edilir?",
options:[
"A) Median filtre",
"B) Sobel operatörü",
"C) Frekans domeni filtreleri",
"D) Histogram eşitleme",
"E) Log dönüşümü"
],
a:2
},

{
q:"Morfolojik genişleme (dilation) işlemi ne yapar?",
options:[
"A) Nesneleri küçültür",
"B) Nesnelerin sınırlarını genişletir",
"C) Gürültü ekler",
"D) Histogramı düzleştirir",
"E) Kenar bulur"
],
a:1
},

{
q:"Renk uzayları neden üç boyutlu tasarlanır?",
options:[
"A) Dosya boyutunu küçültmek için",
"B) Üç temel filtre olduğu için",
"C) Bir rengi tanımlamak için üç bağımsız değişken gerektiği için",
"D) Bilgisayarlar üç boyutlu çalıştığı için",
"E) Histogram oluşturmak için"
],
a:2
},

{
q:"MATLAB'da görüntüyü döndürmek için kullanılan fonksiyon hangisidir?",
options:[
"A) imnoise()",

"C) imrotate()",
"D) histeq()",
"E) edge()"
],
a:2
}

];

const quiz = document.getElementById("quiz");

questions.forEach((item,index)=>{

let html = `
<div class="question">
<h3>${index+1}) ${item.q}</h3>
`;

item.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br><br>
`;

});

html += `
<button class="control-btn" onclick="checkAnswer(${index})">
Kontrol Et
</button>

<p id="result${index}"></p>

</div>
`;

quiz.innerHTML += html;

});

function checkAnswer(index){

const options = document.getElementsByName("q"+index);

let selected = -1;

for(let i=0;i<options.length;i++){

if(options[i].checked){

selected = i;

}

}

const result = document.getElementById("result"+index);

if(selected === -1){

result.innerHTML = "⚠️ Bir seçenek seç!";
return;

}

if(selected === questions[index].a){

result.innerHTML = "✅ Doğru!";
result.className = "correct";

}else{

result.innerHTML = "❌ Yanlış!";
result.className = "wrong";

}

}

function showScore(){

let score = 0;

questions.forEach((q,index)=>{

const options = document.getElementsByName("q"+index);

for(let i=0;i<options.length;i++){

if(options[i].checked && i===q.a){

score++;

}

}

});

document.getElementById("score").innerHTML =
"Skorunuz: " + score + " / " + questions.length;

}

</script>

</body>
</html>
