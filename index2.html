<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Otomata Quiz Pro - 3. Hafta</title>
<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
.question { margin-bottom: 20px; padding:15px; background:white; border-radius:10px; }
button { margin-top:10px; padding:8px 12px; cursor:pointer; }
.correct { color: green; font-weight:bold; }
.wrong { color: red; font-weight:bold; }
h3 { background:#ddd; padding:10px; border-radius:8px; }
.nav-btn { background:#333; color:white; border:none; margin-right:10px; }
</style>
</head>

<body>

<h2>🧠 Otomata Quiz - 3. Hafta (Temel Kavramlar)</h2>

<!-- 🔁 SAYFA SEÇİM -->
<button class="nav-btn" onclick="goWeek2()">⬅️ 2. Hafta</button>
<button class="nav-btn" onclick="goWeek3()">🔄 3. Hafta Yenile</button>

<div id="quiz"></div>

<button onclick="showScore()">📊 Skoru Göster</button>
<p id="score"></p>

<script>

// SAYFA GEÇİŞ
function goWeek2(){
    window.location.href = "index.html";
}

function goWeek3(){
    window.location.href = "index2.html";
}

const questions = [

{q:"Alfabe (Σ) nedir?",
options:[
"Sonsuz sembol kümesi",
"Kelimeler kümesi",
"Sınırlı (sonlu) semboller kümesi",
"Sadece sayılar kümesi"
], a:2},

{q:"Bir kelime (string) nedir?",
options:[
"Sadece tek sembol",
"Sonsuz dizi",
"Alfabeden seçilen sonlu sembol dizisi",
"Sadece sayılar"
], a:2},

{q:"Boş kelime (λ) için hangisi doğrudur?",
options:[
"Alfabenin elemanıdır",
"Uzunluğu 1’dir",
"Uzunluğu 0’dır ve alfabenin elemanı değildir",
"Sadece sayılarda vardır"
], a:2},

{q:"Dil (language) nedir?",
options:[
"Sadece semboller",
"Kelimelerin kümesi",
"Sayılar kümesi",
"Fonksiyonlar kümesi"
], a:1},

{q:"Bir dilin tanımlanması için ne gerekir?",
options:[
"Sadece alfabe",
"Sadece kelimeler",
"Alfabe ve kurallar",
"Sadece semboller"
], a:2},

{q:"Σ* ifadesi neyi temsil eder?",
options:[
"Sadece boş kelime",
"Alfabenin alt kümesi",
"Tüm mümkün kelimeler",
"Sadece tek harfli kelimeler"
], a:2},

{q:"|w| = 4 ifadesi neyi gösterir?",
options:[
"Kelimenin değeri",
"Kelimenin uzunluğu",
"Kelimenin tipi",
"Kelimenin dili"
], a:1},

{q:"Concatenation (birleştirme) nedir?",
options:[
"Kelimeyi ters çevirme",
"İki kelimeyi birleştirme",
"Kelimeyi silme",
"Kelimeyi bölme"
], a:1},

{q:"Prefix (önek) neyi ifade eder?",
options:[
"Kelimenin ortası",
"Kelimenin başı",
"Kelimenin sonu",
"Kelimenin tamamı"
], a:1},

{q:"Suffix (sonek) neyi ifade eder?",
options:[
"Kelimenin başı",
"Kelimenin ortası",
"Kelimenin sonu",
"Kelimenin uzunluğu"
], a:2},

{q:"Subword (alt kelime) nedir?",
options:[
"Sadece ilk harf",
"Ardışık sembollerden oluşan parça",
"Sadece son harf",
"Kelimenin uzunluğu"
], a:1},

{q:"Palindrome nedir?",
options:[
"Sadece sayılar",
"Ters çevrildiğinde değişen kelime",
"Baştan ve sondan aynı okunan kelime",
"Sadece uzun kelimeler"
], a:2},

{q:"Σ={0,1} için Σ² ne olabilir?",
options:[
"{0,1}",
"{00,01,10,11}",
"{000}",
"{λ}"
], a:1},

{q:"Σ* kümesi nasıldır?",
options:[
"Sonlu",
"Sadece tek elemanlı",
"Sonsuz",
"Boş"
], a:2},

{q:"wλ sonucu nedir?",
options:[
"w",
"λ",
"0",
"Tanımsız"
], a:0}

];

let score = 0;
const quizDiv = document.getElementById("quiz");

quizDiv.innerHTML += "<h3>📗 3. Hafta - Temel Kavramlar</h3>";

questions.forEach((item, index) => {

    let html = `<div class="question">
    <p>${index+1}) ${item.q}</p>`;
    
    item.options.forEach((opt, i) => {
        html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
    });

    html += `<button onclick="check(${index})">Kontrol Et</button>
    <p id="r${index}"></p>
    </div>`;

    quizDiv.innerHTML += html;
});

function check(i){
    let opts = document.getElementsByName("q"+i);
    let selected = -1;

    for(let j=0;j<opts.length;j++){
        if(opts[j].checked) selected = j;
    }

    let res = document.getElementById("r"+i);

    if(selected === -1){
        res.innerHTML="⚠️ Seçim yap!";
        return;
    }

    if(selected === questions[i].a){
        res.innerHTML="✅ Doğru!";
        res.className="correct";
    } else {
        res.innerHTML="❌ Yanlış!";
        res.className="wrong";
    }
}

function showScore(){
    score = 0;
    questions.forEach((q,i)=>{
        let opts = document.getElementsByName("q"+i);
        for(let j=0;j<opts.length;j++){
            if(opts[j].checked && j===q.a){
                score++;
            }
        }
    });

    document.getElementById("score").innerHTML = "Skor: " + score + " / 15";
}

</script>

</body>
</html>
